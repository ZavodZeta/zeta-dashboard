<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZETA Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body>

<header class="header">

<h1>ZETA Dashboard</h1>

<p>ABC / XYZ Анализ предприятия</p>

</header>

<main class="container">

<section class="cards">

<div class="card">

<h3>Выручка</h3>

<p id="revenue">0 ₸</p>

</div>

<div class="card">

<h3>SKU</h3>

<p id="sku">0</p>

</div>

<div class="card">

<h3>Клиенты</h3>

<p id="clients">0</p>

</div>

<div class="card">

<h3>Валовая прибыль</h3>

<p id="profit">0 ₸</p>

</div>

</section>

<section class="charts">

<div class="chart-box">

<h2>ABC анализ</h2>

<canvas id="abcChart"></canvas>

</div>

<div class="chart-box">

<h2>XYZ анализ</h2>

<canvas id="xyzChart"></canvas>

</div>

</section>

<section class="matrix">

<h2>Матрица ABC × XYZ</h2>

<div id="matrix"></div>

</section>

<section>

<h2>Товары</h2>

<table id="productTable">

<thead>

<tr>

<th>SKU</th>

<th>Наименование</th>

<th>Выручка</th>

<th>Прибыль</th>

<th>ABC</th>

<th>XYZ</th>

<th>CV</th>

<th>Матрица</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</section>

</main>

<script src="js/excel.js"></script>

<script src="js/parser.js"></script>

<script src="js/analytics.js"></script>

<script src="js/dashboard.js"></script>

<script src="js/charts.js"></script>

<script src="js/table.js"></script>

<script src="js/abcxyz.js"></script>

<script src="js/app.js"></script>

</body>

</html>
